name: Build and deploy Tino Telegram Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: tino-telebot-production
  cancel-in-progress: true

env:
  AZURE_WEBAPP_NAME: tino-telebot
  NODE_VERSION: "22"
  PNPM_VERSION: "11.9.0"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --config.node-linker=hoisted

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Remove development dependencies
        run: pnpm prune --prod --config.node-linker=hoisted

      - name: Create deployment package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          cp -R dist node_modules package.json pnpm-lock.yaml web.config release/
          tar -czf tino-telebot-release.tar.gz -C release .

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: tino-telebot-release
          path: tino-telebot-release.tar.gz
          if-no-files-found: error
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: tino-telebot-release

      - name: Extract deployment package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          tar -xzf tino-telebot-release.tar.gz -C release

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A95ABB369BD9465CA1572B26564C297A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_81CF8CF6F3BC4D7D9913C34551FE9BE1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_80FAD3DB46C944A3935C499236ECA924 }}

      - name: Resolve Azure Web App
        id: azure-app
        shell: bash
        run: |
          set -euo pipefail

          resource_group="$(
            az webapp list \
              --query "[?name=='${AZURE_WEBAPP_NAME}'].resourceGroup | [0]" \
              --output tsv
          )"

          if [ -z "$resource_group" ]; then
            echo "Azure Web App '${AZURE_WEBAPP_NAME}' was not found." >&2
            exit 1
          fi

          hostname="$(
            az webapp show \
              --resource-group "$resource_group" \
              --name "$AZURE_WEBAPP_NAME" \
              --query defaultHostName \
              --output tsv
          )"

          is_linux="$(
            az webapp show \
              --resource-group "$resource_group" \
              --name "$AZURE_WEBAPP_NAME" \
              --query reserved \
              --output tsv
          )"

          plan_id="$(
            az webapp show \
              --resource-group "$resource_group" \
              --name "$AZURE_WEBAPP_NAME" \
              --query serverFarmId \
              --output tsv
          )"
          plan_tier="$(
            az appservice plan show \
              --ids "$plan_id" \
              --query sku.tier \
              --output tsv
          )"

          echo "resource-group=$resource_group" >> "$GITHUB_OUTPUT"
          echo "hostname=$hostname" >> "$GITHUB_OUTPUT"
          echo "is-linux=$is_linux" >> "$GITHUB_OUTPUT"
          echo "plan-tier=$plan_tier" >> "$GITHUB_OUTPUT"

      - name: Validate Azure hosting plan
        shell: bash
        run: |
          set -euo pipefail
          plan_tier="${{ steps.azure-app.outputs.plan-tier }}"

          case "${plan_tier,,}" in
            free|shared)
              echo "Azure App Service plan tier '${plan_tier}' does not support Always On." >&2
              echo "Upgrade the tino-telebot App Service plan to Basic B1 or higher." >&2
              exit 1
              ;;
          esac

          echo "Azure App Service plan tier: ${plan_tier}"

      - name: Validate bot application settings
        shell: bash
        run: |
          set -euo pipefail

          configured_names="$(
            az webapp config appsettings list \
              --resource-group "${{ steps.azure-app.outputs.resource-group }}" \
              --name "$AZURE_WEBAPP_NAME" \
              --query "[].name" \
              --output tsv
          )"

          missing=0
          for name in \
            TELEGRAM_BOT_TOKEN \
            TINO_API_BASE_URL \
            TINO_BOT_SERVICE_SECRET
          do
            if ! grep -Fxq "$name" <<< "$configured_names"; then
              echo "Missing Azure App Setting: $name" >&2
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: Production
          package: release
          startup-command: node dist/index.js

      - name: Configure and restart Azure Web App
        shell: bash
        env:
          RESOURCE_GROUP: ${{ steps.azure-app.outputs.resource-group }}
          IS_LINUX: ${{ steps.azure-app.outputs.is-linux }}
        run: |
          set -euo pipefail

          if [ "$IS_LINUX" = "true" ]; then
            az webapp config set \
              --resource-group "$RESOURCE_GROUP" \
              --name "$AZURE_WEBAPP_NAME" \
              --linux-fx-version "NODE|22-lts" \
              --startup-file "node dist/index.js" \
              --always-on true \
              --output none
          else
            az webapp config set \
              --resource-group "$RESOURCE_GROUP" \
              --name "$AZURE_WEBAPP_NAME" \
              --always-on true \
              --output none
          fi

          az webapp config appsettings set \
            --resource-group "$RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_NAME" \
            --settings \
              TZ=Asia/Bangkok \
              WEBSITE_NODE_DEFAULT_VERSION=~22 \
            --output none

          az webapp log config \
            --resource-group "$RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_NAME" \
            --application-logging filesystem \
            --level information \
            --web-server-logging filesystem \
            --output none

          az webapp restart \
            --resource-group "$RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_NAME" \
            --output none

      - name: Verify deployment
        shell: bash
        env:
          WEBAPP_URL: https://${{ steps.azure-app.outputs.hostname }}
        run: |
          set -euo pipefail
          health_url="${WEBAPP_URL%/}/health"

          for attempt in $(seq 1 18); do
            status_code="$(
              curl \
                --silent \
                --show-error \
                --output health-response.txt \
                --write-out "%{http_code}" \
                "$health_url" || true
            )"

            echo "Attempt ${attempt}/18 returned HTTP ${status_code}"
            cat health-response.txt || true
            echo

            if [ "$status_code" = "200" ]; then
              exit 0
            fi

            sleep 10
          done

          echo "Telegram bot health check failed." >&2
          exit 1

      - name: Collect Azure startup logs
        if: failure()
        shell: bash
        env:
          RESOURCE_GROUP: ${{ steps.azure-app.outputs.resource-group }}
        run: |
          az webapp log download \
            --resource-group "$RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_NAME" \
            --log-file azure-webapp-logs.zip || true

          if [ -f azure-webapp-logs.zip ]; then
            unzip -oq azure-webapp-logs.zip -d azure-webapp-logs
            find azure-webapp-logs -type f \
              \( -name "*.log" -o -name "*.txt" \) \
              -print \
              -exec tail -n 150 {} \; || true
          fi
