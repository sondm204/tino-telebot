name: Build and deploy Tino Telegram Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: tino-telebot-production
  cancel-in-progress: true

env:
  AZURE_WEBAPP_NAME: tino-telebot
  WEBJOB_NAME: tino-telebot
  NODE_VERSION: "22"
  PNPM_VERSION: "11.9.0"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Assemble continuous WebJob
        shell: bash
        run: |
          set -euo pipefail

          job_dir="$RUNNER_TEMP/webjob-package/App_Data/jobs/continuous/${WEBJOB_NAME}"
          mkdir -p "$job_dir"

          cp -R dist "$job_dir/dist"
          cp package.json pnpm-lock.yaml pnpm-workspace.yaml "$job_dir/"

          cat > "$job_dir/run.js" <<'EOF'
          import "./dist/index.js";
          EOF

          cat > "$job_dir/settings.job" <<'EOF'
          {
            "is_singleton": true
          }
          EOF

          (
            cd "$job_dir"
            pnpm install \
              --prod \
              --frozen-lockfile \
              --config.node-linker=hoisted
          )

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: tino-telebot-webjob
          path: ${{ runner.temp }}/webjob-package
          if-no-files-found: error
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: tino-telebot-webjob
          path: webjob-package

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A95ABB369BD9465CA1572B26564C297A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_81CF8CF6F3BC4D7D9913C34551FE9BE1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_80FAD3DB46C944A3935C499236ECA924 }}

      - name: Resolve Azure Web App
        id: azure-app
        shell: bash
        run: |
          set -euo pipefail

          resource_group="$(
            az webapp list \
              --query "[?name=='${AZURE_WEBAPP_NAME}'].resourceGroup | [0]" \
              --output tsv
          )"

          if [ -z "$resource_group" ]; then
            echo "Azure Web App '${AZURE_WEBAPP_NAME}' was not found." >&2
            exit 1
          fi

          echo "resource-group=$resource_group" >> "$GITHUB_OUTPUT"

      - name: Validate bot application settings
        shell: bash
        run: |
          set -euo pipefail

          configured_names="$(
            az webapp config appsettings list \
              --resource-group "${{ steps.azure-app.outputs.resource-group }}" \
              --name "$AZURE_WEBAPP_NAME" \
              --query "[].name" \
              --output tsv
          )"

          missing=0
          for name in \
            TELEGRAM_BOT_TOKEN \
            TINO_API_BASE_URL \
            TINO_BOT_SERVICE_SECRET
          do
            if ! grep -Fxq "$name" <<< "$configured_names"; then
              echo "Missing Azure App Setting: $name" >&2
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Configure continuous WebJob host
        shell: bash
        run: |
          set -euo pipefail

          az webapp config set \
            --resource-group "${{ steps.azure-app.outputs.resource-group }}" \
            --name "$AZURE_WEBAPP_NAME" \
            --always-on true \
            --output none

          az webapp config appsettings set \
            --resource-group "${{ steps.azure-app.outputs.resource-group }}" \
            --name "$AZURE_WEBAPP_NAME" \
            --settings \
              WEBJOBS_RUN_ONCE=1 \
              TZ=Asia/Bangkok \
            --output none

      - name: Deploy continuous WebJob
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: Production
          package: webjob-package

      - name: Verify WebJob
        shell: bash
        run: |
          set -euo pipefail

          resource_group="${{ steps.azure-app.outputs.resource-group }}"
          sleep 15

          for attempt in $(seq 1 12); do
            error_file="$(mktemp)"
            status="$(
              az webapp webjob continuous list \
                --resource-group "$resource_group" \
                --name "$AZURE_WEBAPP_NAME" \
                --query "[?name=='${WEBJOB_NAME}'].status | [0]" \
                --output tsv \
                2>"$error_file"
            )" || true
            error_message="$(cat "$error_file")"
            rm -f "$error_file"

            if [ "$status" = "Running" ]; then
              echo "Continuous WebJob '${WEBJOB_NAME}' is running."
              exit 0
            fi

            if [ -n "$status" ] && [ "$status" != "Running" ]; then
              az webapp webjob continuous start \
                --resource-group "$resource_group" \
                --name "$AZURE_WEBAPP_NAME" \
                --webjob-name "$WEBJOB_NAME" \
                --output none || true
            fi

            echo "Attempt ${attempt}/12: WebJob status is '${status:-unavailable}'."
            if [ -n "$error_message" ]; then
              echo "$error_message"
            fi
            sleep 10
          done

          echo "Continuous WebJob did not reach Running state." >&2
          az webapp webjob continuous list \
            --resource-group "$resource_group" \
            --name "$AZURE_WEBAPP_NAME" \
            --output table || true
          exit 1
